<text x="60" y="172" fill="#2563eb" font-size="13" font-weight="600">业务层</text>
<rect x="140" y="160" width="180" height="50" rx="6" fill="#fff" stroke="#7dd3fc" stroke-width="1" filter="url(#s1)"/>
