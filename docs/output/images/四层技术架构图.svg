<text x="280" y="100" text-anchor="middle" fill="#6b7280" font-size="10">知识库/对话/管理界面</text>
<rect x="400" y="60" width="160" height="50" rx="6" fill="#fff" stroke="#c4b5fd" stroke-width="1" filter="url(#s1)"/>
