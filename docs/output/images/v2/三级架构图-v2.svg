  <rect x="490" y="555" width="170" height="44" rx="6" fill="#FFFFFF" stroke="#1E2761" stroke-width="1"/>
  <text x="575" y="582" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#1E2761" text-anchor="middle">智能分块</text>

  <rect x="680" y="555" width="170" height="44" rx="6" fill="#FFFFFF" stroke="#1E2761" stroke-width="1"/>
  <text x="765" y="582" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#1E2761" text-anchor="middle">元数据标注</text>

  <rect x="870" y="555" width="170" height="44" rx="6" fill="#FFFFFF" stroke="#1E2761" stroke-width="1"/>
