<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E2761"/>
      <stop offset="100%" stop-color="#2A3A7E"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#F8FAFC"/>
  <rect width="1280" height="65" fill="url(#headerGrad)"/>
  <text x="60" y="42" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="28" fill="#FFFFFF" font-weight="bold">M1 外挂知识库模块</text>
  <text x="380" y="42" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#CADCFC">第一级：军事文档深度加工与语义化重构</text>

  <!-- Left: capabilities -->
  <rect x="40" y="85" width="550" height="400" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="40" y="85" width="6" height="400" fill="#1E2761"/>
  <text x="70" y="118" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="20" fill="#1E2761" font-weight="bold">核心能力</text>

  <rect x="70" y="138" width="5" height="38" fill="#2DD4A8"/>
  <text x="88" y="153" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="15" fill="#1E2761" font-weight="bold">知识库 CRUD 管理</text>
  <text x="88" y="170" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">创建、查看、编辑、删除知识库，支持多知识库并行</text>

  <rect x="70" y="190" width="5" height="38" fill="#2DD4A8"/>
  <text x="88" y="205" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="15" fill="#1E2761" font-weight="bold">多格式文档上传</text>
  <text x="88" y="222" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">支持 PDF/Word/Excel/TXT/Markdown/图片等格式</text>

  <rect x="70" y="242" width="5" height="38" fill="#2DD4A8"/>
  <text x="88" y="257" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="15" fill="#1E2761" font-weight="bold">深度文档解析</text>
  <text x="88" y="274" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">版面分析、表格提取、图文识别、多栏检测</text>

  <rect x="70" y="294" width="5" height="38" fill="#2DD4A8"/>
  <text x="88" y="309" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="15" fill="#1E2761" font-weight="bold">多策略智能分块</text>
  <text x="88" y="326" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">通用/手册/Q&amp;A/论文/法律/表格 6种分块策略</text>

  <rect x="70" y="346" width="5" height="38" fill="#2DD4A8"/>
  <text x="88" y="361" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="15" fill="#1E2761" font-weight="bold">元数据自动标注</text>
  <text x="88" y="378" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">文档标题、作者、日期、分类等元数据提取</text>

  <rect x="70" y="398" width="5" height="38" fill="#2DD4A8"/>
  <text x="88" y="413" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="15" fill="#1E2761" font-weight="bold">多源异构数据整合</text>
  <text x="88" y="430" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">统一格式入库，跨来源知识关联</text>

  <rect x="70" y="450" width="5" height="22" fill="#2DD4A8"/>
  <text x="88" y="466" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">分块预览与手动编辑</text>

  <!-- Right: screenshot -->
  <rect x="620" y="85" width="620" height="400" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="640" y="115" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" fill="#64748B">知识库管理界面</text>
  <image href="../images/10-知识库管理页.png" x="640" y="130" width="580" height="340" preserveAspectRatio="xMidYMid slice"/>

  <!-- Bottom: tech tags -->
  <rect x="40" y="510" width="1200" height="70" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="80" y="525" width="160" height="35" rx="6" fill="#E0E7FF"/>
  <text x="160" y="548" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#1E2761" text-anchor="middle">ragflow v0.18.0</text>

  <rect x="260" y="525" width="160" height="35" rx="6" fill="#E0E7FF"/>
  <text x="340" y="548" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#1E2761" text-anchor="middle">MinIO 对象存储</text>

  <rect x="440" y="525" width="160" height="35" rx="6" fill="#D1FAE5"/>
  <text x="520" y="548" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#059669" text-anchor="middle">ES 向量索引</text>

  <rect x="620" y="525" width="200" height="35" rx="6" fill="#D1FAE5"/>
  <text x="720" y="548" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#059669" text-anchor="middle">多格式解析引擎</text>

  <rect x="840" y="525" width="200" height="35" rx="6" fill="#E0E7FF"/>
  <text x="940" y="548" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#1E2761" text-anchor="middle">6种分块策略</text>

  <text x="1220" y="700" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#94A3B8" text-anchor="end">8 / 14</text>
</svg>
