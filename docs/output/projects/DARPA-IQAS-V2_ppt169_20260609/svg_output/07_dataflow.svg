<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E2761"/>
      <stop offset="100%" stop-color="#2A3A7E"/>
    </linearGradient>
    <marker id="flowArrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2DD4A8"/>
    </marker>
    <marker id="flowArrowDark" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1E2761"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="#F8FAFC"/>
  <rect width="1280" height="65" fill="url(#headerGrad)"/>
  <text x="60" y="42" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="28" fill="#FFFFFF" font-weight="bold">信息流程 / 数据流</text>
  <text x="350" y="42" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#CADCFC">从文档上传到智能问答的完整数据链路</text>

  <!-- Flow: horizontal process -->
  <!-- Step 1: 文档上传 -->
  <rect x="40" y="100" width="170" height="90" rx="8" fill="#1E2761"/>
  <text x="125" y="135" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">文档上传</text>
  <text x="125" y="158" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#CADCFC" text-anchor="middle">PDF/Word/Excel</text>
  <text x="125" y="175" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#CADCFC" text-anchor="middle">TXT/Markdown/图片</text>

  <line x1="210" y1="145" x2="240" y2="145" stroke="#2DD4A8" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 2: 文档解析 -->
  <rect x="245" y="100" width="170" height="90" rx="8" fill="#1E2761" fill-opacity="0.85"/>
  <text x="330" y="135" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">文档解析</text>
  <text x="330" y="158" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#CADCFC" text-anchor="middle">版面分析</text>
  <text x="330" y="175" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#CADCFC" text-anchor="middle">表格提取 · 图文识别</text>

  <line x1="415" y1="145" x2="445" y2="145" stroke="#2DD4A8" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 3: 智能分块 -->
  <rect x="450" y="100" width="170" height="90" rx="8" fill="#1E2761" fill-opacity="0.7"/>
  <text x="535" y="135" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">智能分块</text>
  <text x="535" y="158" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#CADCFC" text-anchor="middle">多策略分块</text>
  <text x="535" y="175" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#CADCFC" text-anchor="middle">元数据自动标注</text>

  <line x1="620" y1="145" x2="650" y2="145" stroke="#2DD4A8" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 4: 向量索引 -->
  <rect x="655" y="100" width="170" height="90" rx="8" fill="#2DD4A8" fill-opacity="0.85"/>
  <text x="740" y="135" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">向量索引</text>
  <text x="740" y="158" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">Embedding编码</text>
  <text x="740" y="175" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">Elasticsearch存储</text>

  <line x1="825" y1="145" x2="855" y2="145" stroke="#2DD4A8" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 5: 知识库就绪 -->
  <rect x="860" y="100" width="170" height="90" rx="8" fill="#2DD4A8"/>
  <text x="945" y="135" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">知识库就绪</text>
  <text x="945" y="158" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">结构化知识块</text>
  <text x="945" y="175" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">向量+元数据</text>

  <!-- Label: M1 processing -->
  <rect x="40" y="85" width="50" height="18" rx="9" fill="#1E2761"/>
  <text x="65" y="98" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">M1</text>

  <!-- Divider -->
  <line x1="40" y1="215" x2="1240" y2="215" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="60" y="240" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="16" fill="#64748B" font-weight="bold">查询流程</text>

  <!-- Query flow: vertical from user -->
  <!-- User -->
  <rect x="60" y="260" width="140" height="60" rx="30" fill="#4A7BF7"/>
  <text x="130" y="295" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle" font-weight="bold">用户提问</text>

  <line x1="200" y1="290" x2="250" y2="290" stroke="#4A7BF7" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Query processing -->
  <rect x="255" y="260" width="180" height="60" rx="8" fill="#FFFFFF" stroke="#4A7BF7" stroke-width="1.5"/>
  <text x="345" y="285" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" fill="#1E2761" text-anchor="middle" font-weight="bold">查询预处理</text>
  <text x="345" y="305" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">意图识别 · Query改写</text>

  <line x1="435" y1="290" x2="485" y2="290" stroke="#2DD4A8" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Vector search -->
  <rect x="490" y="260" width="180" height="60" rx="8" fill="#FFFFFF" stroke="#2DD4A8" stroke-width="1.5"/>
  <text x="580" y="285" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" fill="#1E2761" text-anchor="middle" font-weight="bold">混合检索</text>
  <text x="580" y="305" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">向量 + 关键词双路</text>

  <line x1="670" y1="290" x2="720" y2="290" stroke="#2DD4A8" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Reranking -->
  <rect x="725" y="260" width="170" height="60" rx="8" fill="#FFFFFF" stroke="#2DD4A8" stroke-width="1.5"/>
  <text x="810" y="285" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" fill="#1E2761" text-anchor="middle" font-weight="bold">语义重排序</text>
  <text x="810" y="305" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">相关度评分 · Top-K</text>

  <!-- Label: M2 -->
  <rect x="490" y="245" width="50" height="18" rx="9" fill="#2DD4A8"/>
  <text x="515" y="258" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">M2</text>

  <!-- Arrow down to prompt assembly -->
  <line x1="810" y1="320" x2="810" y2="355" stroke="#1E2761" stroke-width="2" marker-end="url(#flowArrowDark)"/>

  <!-- Prompt assembly -->
  <rect x="540" y="360" width="540" height="70" rx="8" fill="#4A7BF7" fill-opacity="0.1" stroke="#4A7BF7" stroke-width="1.5"/>
  <text x="810" y="388" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="15" fill="#1E2761" text-anchor="middle" font-weight="bold">提示词组装</text>
  <text x="810" y="412" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">系统提示词 + 检索结果 + 用户问题 + 对话历史 → 结构化 Prompt</text>

  <!-- Label: M3 -->
  <rect x="540" y="345" width="50" height="18" rx="9" fill="#4A7BF7"/>
  <text x="565" y="358" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">M3</text>

  <!-- Arrow to LLM -->
  <line x1="810" y1="430" x2="810" y2="455" stroke="#1E2761" stroke-width="2" marker-end="url(#flowArrowDark)"/>

  <!-- LLM -->
  <rect x="660" y="460" width="300" height="60" rx="8" fill="#1E2761"/>
  <text x="810" y="488" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle" font-weight="bold">智谱 GLM-9B 本地推理</text>
  <text x="810" y="508" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#CADCFC" text-anchor="middle">流式生成 · 引用标注</text>

  <!-- Arrow to response -->
  <line x1="810" y1="520" x2="810" y2="545" stroke="#2DD4A8" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Response -->
  <rect x="660" y="550" width="300" height="55" rx="8" fill="#2DD4A8"/>
  <text x="810" y="578" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle" font-weight="bold">结构化回答 + 引用溯源</text>
  <text x="810" y="596" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">返回给用户</text>

  <!-- Left side: knowledge base reference -->
  <rect x="60" y="360" width="440" height="140" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="80" y="388" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" fill="#1E2761" font-weight="bold">知识库支撑</text>

  <rect x="80" y="400" width="120" height="30" rx="6" fill="#E0E7FF"/>
  <text x="140" y="420" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#1E2761" text-anchor="middle">向量索引</text>

  <rect x="215" y="400" width="120" height="30" rx="6" fill="#E0E7FF"/>
  <text x="275" y="420" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#1E2761" text-anchor="middle">全文索引</text>

  <rect x="350" y="400" width="120" height="30" rx="6" fill="#D1FAE5"/>
  <text x="410" y="420" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#059669" text-anchor="middle">知识图谱</text>

  <text x="80" y="460" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">Elasticsearch 8.11 提供向量+全文混合索引</text>
  <text x="80" y="480" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">MinIO 存储原始文档文件</text>

  <!-- Bottom note -->
  <text x="60" y="660" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#94A3B8">全链路数据在本地服务器内闭环，无外网传输</text>

  <text x="1220" y="700" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#94A3B8" text-anchor="end">7 / 14</text>
</svg>
