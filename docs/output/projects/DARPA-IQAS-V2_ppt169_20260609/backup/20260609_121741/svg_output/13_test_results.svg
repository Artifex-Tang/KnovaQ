  <text x="720" y="283" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="32" fill="#4A7BF7" font-weight="bold">93%</text>
  <text x="720" y="315" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">13/14 通过</text>

