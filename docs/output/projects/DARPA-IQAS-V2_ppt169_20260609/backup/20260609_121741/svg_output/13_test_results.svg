  <text x="1000" y="250" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" fill="#1E2761" font-weight="bold">菜单验证测试</text>
  <text x="1000" y="283" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="32" fill="#1E2761" font-weight="bold">88%</text>
  <text x="1000" y="315" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">7/8 通过</text>

