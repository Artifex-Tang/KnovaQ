  <rect x="40" y="360" width="1200" height="80" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="60" y="390" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="16" fill="#1E2761" font-weight="bold">测试技术栈</text>

  <rect x="60" y="405" width="170" height="26" rx="13" fill="#1E2761"/>
