  <!-- Left: Big stat -->
  <rect x="40" y="85" width="350" height="250" rx="10" fill="#1E2761" filter="url(#shadow)"/>
  <text x="215" y="170" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="80" fill="#2DD4A8" text-anchor="middle" font-weight="bold">92%</text>
  <text x="215" y="210" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="22" fill="#FFFFFF" text-anchor="middle">综合通过率</text>
  <text x="215" y="245" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#CADCFC" text-anchor="middle">64条用例 · 59条通过 · 5条待优化</text>

  <!-- Right: Module cards 2x3 -->
  <!-- M1 -->
  <rect x="420" y="85" width="260" height="115" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
