  <text x="1000" y="115" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" fill="#1E2761" font-weight="bold">M3 交互式测试</text>
  <text x="1000" y="148" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="32" fill="#4A7BF7" font-weight="bold">92%</text>
  <text x="1000" y="180" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">11/12 通过</text>

