  <text x="440" y="115" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" fill="#1E2761" font-weight="bold">M1 知识库测试</text>
  <text x="440" y="148" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="32" fill="#4A7BF7" font-weight="bold">90%</text>
  <text x="440" y="180" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">9/10 通过</text>

  <!-- M2 -->
  <rect x="700" y="85" width="260" height="115" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="700" y="85" width="260" height="4" fill="#2DD4A8"/>
  <text x="720" y="115" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" fill="#1E2761" font-weight="bold">M2 RAG检索测试</text>
  <text x="720" y="148" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="32" fill="#2DD4A8" font-weight="bold">90%</text>
  <text x="720" y="180" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">9/10 通过</text>

