  <text x="690" y="423" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#1E2761" text-anchor="middle">Docker 容器化</text>

  <!-- Test approach summary -->
  <rect x="40" y="460" width="1200" height="80" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="40" y="460" width="6" height="80" fill="#2DD4A8"/>
  <text x="65" y="488" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="15" fill="#1E2761" font-weight="bold">测试方法</text>
  <text x="65" y="512" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#64748B">API 接口测试（pytest + requests）— 验证后端 API 功能正确性</text>
  <text x="65" y="530" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#64748B">UI 端到端测试（Playwright）— 验证前端交互与业务流程完整性</text>

  <!-- Quality note -->
  <rect x="40" y="560" width="1200" height="55" rx="8" fill="#D1FAE5" fill-opacity="0.5" stroke="#2DD4A8" stroke-width="1"/>
  <text x="60" y="585" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" fill="#059669" font-weight="bold">质量保障</text>
  <text x="170" y="585" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#059669">自动化测试覆盖全链路 · CI/CD 集成 · Allure 详细报告 · 5条待优化用例已定位根因</text>

  <text x="1220" y="700" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#94A3B8" text-anchor="end">13 / 14</text>
</svg>
