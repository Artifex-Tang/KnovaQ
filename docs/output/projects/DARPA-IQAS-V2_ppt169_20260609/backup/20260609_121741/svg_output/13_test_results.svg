  <text x="440" y="283" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="32" fill="#2DD4A8" font-weight="bold">100%</text>
  <text x="440" y="315" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">10/10 通过</text>

