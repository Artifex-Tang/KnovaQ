<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E2761"/>
      <stop offset="100%" stop-color="#2A3A7E"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#F8FAFC"/>
  <rect width="1280" height="65" fill="url(#headerGrad)"/>
  <text x="60" y="42" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="28" fill="#FFFFFF" font-weight="bold">M2 RAG检索增强模块</text>
  <text x="410" y="42" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#CADCFC">第二级：多维度混合检索与语义重排序</text>

  <!-- Left: capabilities -->
  <rect x="40" y="85" width="550" height="400" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="40" y="85" width="6" height="400" fill="#2DD4A8"/>
  <text x="70" y="118" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="20" fill="#1E2761" font-weight="bold">核心能力</text>

  <rect x="70" y="138" width="5" height="38" fill="#4A7BF7"/>
  <text x="88" y="153" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="15" fill="#1E2761" font-weight="bold">向量语义检索</text>
  <text x="88" y="170" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">基于 Embedding 的高维向量相似度匹配</text>

  <rect x="70" y="190" width="5" height="38" fill="#4A7BF7"/>
  <text x="88" y="205" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="15" fill="#1E2761" font-weight="bold">混合检索</text>
  <text x="88" y="222" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">向量检索 + 关键词检索双路召回，融合排序</text>

  <rect x="70" y="242" width="5" height="38" fill="#4A7BF7"/>
  <text x="88" y="257" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="15" fill="#1E2761" font-weight="bold">相似度阈值调节</text>
  <text x="88" y="274" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">动态调节检索精度与召回率平衡点</text>

  <rect x="70" y="294" width="5" height="38" fill="#4A7BF7"/>
  <text x="88" y="309" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="15" fill="#1E2761" font-weight="bold">检索结果重排序</text>
  <text x="88" y="326" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">语义相关性二次排序，提升 Top-K 精度</text>

  <rect x="70" y="346" width="5" height="38" fill="#4A7BF7"/>
  <text x="88" y="361" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="15" fill="#1E2761" font-weight="bold">知识图谱辅助检索</text>
  <text x="88" y="378" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">GraphRAG 图结构检索，实体关系推理</text>

  <rect x="70" y="398" width="5" height="38" fill="#4A7BF7"/>
  <text x="88" y="413" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="15" fill="#1E2761" font-weight="bold">跨语言检索</text>
  <text x="88" y="430" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">支持中英文混合检索，跨语言语义对齐</text>

  <!-- Right: screenshot -->
  <rect x="620" y="85" width="620" height="400" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="640" y="115" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" fill="#64748B">知识检索界面</text>
  <image href="../images/04-知识检索页.png" x="640" y="130" width="580" height="340" preserveAspectRatio="xMidYMid slice"/>

  <!-- Bottom: tech tags -->
  <rect x="40" y="510" width="1200" height="70" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="80" y="525" width="160" height="35" rx="6" fill="#E0E7FF"/>
  <text x="160" y="548" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#1E2761" text-anchor="middle">Elasticsearch 8.11</text>

  <rect x="260" y="525" width="160" height="35" rx="6" fill="#D1FAE5"/>
  <text x="340" y="548" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#059669" text-anchor="middle">向量+全文混合</text>

  <rect x="440" y="525" width="160" height="35" rx="6" fill="#E0E7FF"/>
  <text x="520" y="548" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#1E2761" text-anchor="middle">语义重排序</text>

  <rect x="620" y="525" width="160" height="35" rx="6" fill="#D1FAE5"/>
  <text x="700" y="548" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#059669" text-anchor="middle">GraphRAG</text>

  <rect x="800" y="525" width="160" height="35" rx="6" fill="#E0E7FF"/>
  <text x="880" y="548" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#1E2761" text-anchor="middle">跨语言检索</text>

  <text x="1220" y="700" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#94A3B8" text-anchor="end">9 / 14</text>
</svg>
