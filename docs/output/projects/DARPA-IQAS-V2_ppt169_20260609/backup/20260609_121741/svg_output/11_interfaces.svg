<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E2761"/>
      <stop offset="100%" stop-color="#2A3A7E"/>
    </linearGradient>
    <marker id="intArrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2DD4A8"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="#F8FAFC"/>
  <rect width="1280" height="65" fill="url(#headerGrad)"/>
  <text x="60" y="42" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="28" fill="#FFFFFF" font-weight="bold">接口设计</text>
  <text x="190" y="42" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#CADCFC">外部接口关系与内部接口设计</text>

  <!-- Center: System -->
  <rect x="440" y="220" width="400" height="280" rx="12" fill="#1E2761"/>
  <text x="640" y="260" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle" font-weight="bold">DARPA-IQAS</text>
  <text x="640" y="285" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#CADCFC" text-anchor="middle">智能问答服务工具</text>

  <!-- Internal blocks inside system -->
  <rect x="460" y="310" width="170" height="40" rx="6" fill="#2DD4A8"/>
  <text x="545" y="335" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">gaisoft-server</text>

  <rect x="650" y="310" width="170" height="40" rx="6" fill="#4A7BF7"/>
  <text x="735" y="335" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">ragflow-server</text>

  <rect x="460" y="370" width="170" height="35" rx="6" fill="#FFFFFF" fill-opacity="0.2"/>
  <text x="545" y="392" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">MySQL / Redis</text>

  <rect x="650" y="370" width="170" height="35" rx="6" fill="#FFFFFF" fill-opacity="0.2"/>
  <text x="735" y="392" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">ES / MinIO</text>

  <rect x="460" y="420" width="360" height="35" rx="6" fill="#FFFFFF" fill-opacity="0.15"/>
  <text x="640" y="442" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">GLM-9B 本地 LLM 推理引擎</text>

  <!-- Internal arrows -->
  <line x1="630" y1="330" x2="650" y2="330" stroke="#CADCFC" stroke-width="1.5"/>
  <line x1="545" y1="350" x2="545" y2="370" stroke="#CADCFC" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="735" y1="350" x2="735" y2="370" stroke="#CADCFC" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- External: User (top) -->
  <rect x="520" y="100" width="240" height="60" rx="30" fill="#4A7BF7"/>
  <text x="640" y="136" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold">军事科研用户</text>
  <line x1="640" y1="160" x2="640" y2="220" stroke="#4A7BF7" stroke-width="2" marker-end="url(#intArrow)"/>
  <text x="660" y="195" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#4A7BF7">HTTP / HTTPS</text>

  <!-- External: Admin (left) -->
  <rect x="40" y="300" width="200" height="55" rx="8" fill="#2DD4A8"/>
  <text x="140" y="325" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">系统管理员</text>
  <text x="140" y="343" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">管理控制台</text>
  <line x1="240" y1="327" x2="440" y2="327" stroke="#2DD4A8" stroke-width="2" marker-end="url(#intArrow)"/>
  <text x="340" y="318" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#2DD4A8">REST API :8088</text>

  <!-- External: Knowledge Engineer (left-bottom) -->
  <rect x="40" y="400" width="200" height="55" rx="8" fill="#2DD4A8" fill-opacity="0.8"/>
  <text x="140" y="425" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">知识工程师</text>
  <text x="140" y="443" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">RAG管理界面</text>
  <line x1="240" y1="427" x2="440" y2="380" stroke="#2DD4A8" stroke-width="1.5" marker-end="url(#intArrow)"/>
  <text x="330" y="395" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#2DD4A8">REST API :9380</text>

  <!-- External: ragflow Web UI (right) -->
  <rect x="1040" y="280" width="200" height="55" rx="8" fill="#4A7BF7" fill-opacity="0.8"/>
  <text x="1140" y="305" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">ragflow Web UI</text>
  <text x="1140" y="323" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">:8070</text>
  <line x1="840" y1="330" x2="1040" y2="307" stroke="#4A7BF7" stroke-width="1.5" marker-end="url(#intArrow)"/>

  <!-- External: gaisoft-frontend (right-bottom) -->
  <rect x="1040" y="370" width="200" height="55" rx="8" fill="#1E2761" fill-opacity="0.7"/>
  <text x="1140" y="395" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">gaisoft-frontend</text>
  <text x="1140" y="413" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">:8899</text>
  <line x1="840" y1="395" x2="1040" y2="397" stroke="#1E2761" stroke-width="1.5" marker-end="url(#intArrow)"/>

  <!-- External: Data sources (bottom) -->
  <rect x="440" y="540" width="170" height="55" rx="8" fill="#94A3B8" fill-opacity="0.3" stroke="#94A3B8" stroke-width="1"/>
  <text x="525" y="565" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="13" fill="#64748B" text-anchor="middle" font-weight="bold">军事文档</text>
  <text x="525" y="583" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">PDF/Word/Excel</text>

  <rect x="630" y="540" width="170" height="55" rx="8" fill="#94A3B8" fill-opacity="0.3" stroke="#94A3B8" stroke-width="1"/>
  <text x="715" y="565" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="13" fill="#64748B" text-anchor="middle" font-weight="bold">DARPA 数据</text>
  <text x="715" y="583" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">领域知识库</text>

  <line x1="640" y1="540" x2="640" y2="500" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#intArrow)"/>
  <text x="660" y="530" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#94A3B8">文件上传</text>

  <!-- Legend -->
  <rect x="40" y="630" width="1200" height="55" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="60" y="655" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="13" fill="#1E2761" font-weight="bold">接口协议</text>
  <text x="160" y="655" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">REST API (HTTP/HTTPS)</text>
  <text x="380" y="655" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">SSE 流式推送</text>
  <text x="530" y="655" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">JWT Token 认证</text>
  <text x="720" y="655" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">Nginx 反向代理</text>
  <text x="920" y="655" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">Docker 内部网络</text>

  <text x="1220" y="700" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#94A3B8" text-anchor="end">11 / 14</text>
</svg>
