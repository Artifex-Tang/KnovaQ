services:

  # ── ragflow core ─────────────────────────────────────────────────────────
  ragflow:
    image: ${RAGFLOW_IMAGE:-infiniflow/ragflow:v0.18.0}
    container_name: ragflow-server
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${SVR_HTTP_PORT:-9380}:9380"
      - "${RAGFLOW_HTTP_PORT:-8080}:80"
    volumes:
      - ragflow_logs:/ragflow/logs
      - ragflow_upload:/ragflow/public/upload
      - ./nginx/ragflow.conf:/etc/nginx/conf.d/ragflow.conf
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    env_file: .env
    environment:
      - TZ=${TIMEZONE:-Asia/Shanghai}
      - HF_ENDPOINT=${HF_ENDPOINT:-}
      - MACOS=${MACOS:-0}
    networks:
      - ragflow
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9380 -o /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s
    restart: on-failure

  # ── Elasticsearch ────────────────────────────────────────────────────────
  es01:
    image: elasticsearch:${STACK_VERSION:-8.11.3}
    container_name: ragflow-es-01
    environment:
      - node.name=es01
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-infini_rag_flow}
      - bootstrap.memory_lock=false
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - cluster.routing.allocation.disk.watermark.low=5gb
      - cluster.routing.allocation.disk.watermark.high=3gb
      - cluster.routing.allocation.disk.watermark.flood_stage=2gb
      - TZ=${TIMEZONE:-Asia/Shanghai}
    mem_limit: ${MEM_LIMIT:-8073741824}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata01:/usr/share/elasticsearch/data
    networks:
      - ragflow
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:9200"]
      interval: 10s
      timeout: 10s
      retries: 120
    restart: on-failure

  # ── MySQL ────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:${MYSQL_VERSION:-8.0.39}
    container_name: ragflow-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD:-infini_rag_flow}
      - TZ=${TIMEZONE:-Asia/Shanghai}
    command:
      --max_connections=1000
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --tls_version="TLSv1.2,TLSv1.3"
      --init-file /data/application/init.sql
      --binlog_expire_logs_seconds=604800
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init/ragflow-init.sql:/data/application/init.sql
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - ragflow
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-p${MYSQL_PASSWORD:-infini_rag_flow}"]
      interval: 10s
      timeout: 10s
      retries: 3
    restart: on-failure

  # ── MinIO ────────────────────────────────────────────────────────────────
  minio:
    image: quay.io/minio/minio:${MINIO_VERSION:-RELEASE.2023-12-20T01-00-02Z}
    container_name: ragflow-minio
    environment:
      - MINIO_ROOT_USER=${MINIO_USER:-rag_flow}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD:-infini_rag_flow}
      - TZ=${TIMEZONE:-Asia/Shanghai}
    command: server --console-address ":9001" /data
    volumes:
      - minio_data:/data
    networks:
      - ragflow
    restart: on-failure

  # ── Redis (Valkey) ───────────────────────────────────────────────────────
  redis:
    image: valkey/valkey:${VALKEY_VERSION:-8}
    container_name: ragflow-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-infini_rag_flow} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ragflow
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli --no-auth-warning -a ${REDIS_PASSWORD:-infini_rag_flow} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: on-failure

  # ── gaisoft-server (Spring Boot) ─────────────────────────────────────────
  gaisoft-server:
    image: gaisoftmes
    container_name: equipment-server
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      ragflow:
        condition: service_healthy
    volumes:
      - ./gaisoft/jar:/usr/soft
      - ./gaisoft/uploadfile:/ragflow/uploadPath
    networks:
      - ragflow
    ports:
      - "${GAISOFT_SERVER_PORT:-8088}:8080"
    restart: always

  # ── gaisoft-frontend (nginx) ─────────────────────────────────────────────
  # IMPORTANT: Run via ./scripts/start.sh <project>, not docker compose up directly.
  # start.sh copies the customer nginx config into gaisoft/nginx/conf.d/ first.
  # Running docker compose up directly leaves conf.d/ empty — nginx will serve no routes.
  gaisoft-frontend:
    image: nginx:${NGINX_VERSION:-1.27-alpine}
    container_name: equipment-front
    depends_on:
      - gaisoft-server
    volumes:
      - ./gaisoft/nginx/html:/usr/share/nginx/html
      - ./gaisoft/nginx/logs:/var/log/nginx
      - ./gaisoft/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - ragflow
    ports:
      - "${GAISOFT_FRONTEND_PORT:-8899}:80"
    restart: always

networks:
  ragflow:
    driver: bridge

volumes:
  esdata01:
  mysql_data:
  minio_data:
  redis_data:
  ragflow_logs:
  ragflow_upload:
