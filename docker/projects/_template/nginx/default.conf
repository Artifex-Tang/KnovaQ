server {
    listen 80;
    server_name _;

    # ── Frontend static files ─────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Streaming API (SSE — must disable buffering) ──────
    location /prod-api/proxy/stream {
        proxy_pass         http://gaisoft-server:8080/proxy/stream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering "no";
    }

    # ── Druid monitoring ─────────────────────────────────
    location /druid/ {
        proxy_pass         http://gaisoft-server:8080/druid/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    300s;
    }

    # ── Backend API ───────────────────────────────────────
    location /prod-api/ {
        proxy_pass         http://gaisoft-server:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    300s;
    }

    # ── Static asset cache (exclude druid + backend-routed prod-api) ─────
    location ~* ^(?!/druid/|/prod-api/).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root    /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
